<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SilentRoof â AI Lead Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#080a0f;--surface:#0d1117;--card:#141c2b;--border:#1e2d45;--border2:#243450;
  --hot:#ff3b30;--hot-dim:rgba(255,59,48,.12);--warm:#ff9f0a;--warm-dim:rgba(255,159,10,.10);
  --watch:#30d158;--watch-dim:rgba(48,209,88,.08);--accent:#00c8ff;--accent-dim:rgba(0,200,255,.08);
  --text:#e8edf5;--muted:#5a7090;--muted2:#3a5070;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
}
html,body{height:100%;background:var(--void);color:var(--text);font-family:var(--display);overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,.012) 2px,rgba(0,200,255,.012) 4px);pointer-events:none;z-index:0}
.shell{display:grid;grid-template-rows:56px 1fr;height:100vh;position:relative;z-index:1}
.topbar{display:flex;align-items:center;padding:0 20px;gap:12px;border-bottom:1px solid var(--border);background:rgba(8,10,15,.95)}
.logo-text{font-family:var(--display);font-size:17px;font-weight:800;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.logo-tag{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;border-left:1px solid var(--border2);padding-left:12px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--watch);flex-shrink:0}
.pulse-dot.live{animation:pulse 2s ease-in-out infinite}
.pulse-dot.scanning{background:var(--warm);animation:blink .5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(48,209,88,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(48,209,88,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-family:var(--mono);font-size:10px;color:var(--watch);letter-spacing:1.5px}
.live-label.scanning{color:var(--warm)}
.topbar-btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
.topbar-btn.primary{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.topbar-btn:disabled{opacity:.4;cursor:not-allowed}
.main{display:grid;grid-template-columns:220px 1fr 300px;overflow:hidden}
.sidebar{border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;overflow-y:auto;background:var(--surface)}
.sidebar-section{padding:0 12px 14px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:0 8px;margin-bottom:8px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:10px 12px;margin-bottom:6px}
.stat-num{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.stat-num.hot{color:var(--hot)}.stat-num.warm{color:var(--warm)}.stat-num.watch{color:var(--watch)}.stat-num.total{color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:3px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--display);font-size:12px;transition:all .15s;text-align:left}
.filter-btn:hover,.filter-btn.active{background:var(--card);color:var(--text)}
.filter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.filter-count{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted2)}
.search-wrap{padding:0 12px;margin-bottom:12px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}
.tier-option{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:10px;margin-bottom:4px;transition:all .2s;width:100%}
.tier-option:hover{border-color:var(--accent-dim);color:var(--text)}
.tier-option.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.tier-option .tier-price{font-size:9px;color:var(--muted2)}
.tier-option.active .tier-price{color:var(--accent)}
.lead-list-wrap{overflow-y:auto;background:var(--void)}
.scan-progress{padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;gap:10px}
.scan-progress.visible{display:flex}
.progress-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px}
.progress-bar-fill{height:3px;background:var(--accent);border-radius:2px;transition:width .4s ease}
.scan-msg{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.list-header{display:grid;grid-template-columns:28px 1fr 80px 90px 80px 60px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.list-header span{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2)}
.lead-row{display:grid;grid-template-columns:28px 1fr 80px 90px 80px 60px;padding:10px 16px;border-bottom:1px solid rgba(30,45,69,.5);cursor:pointer;transition:background .15s;align-items:center;animation:fadeIn .25s ease both}
.lead-row:hover{background:var(--card)}
.lead-row.selected{background:rgba(0,200,255,.05);border-left:2px solid var(--accent)}
.tier-bar{width:3px;height:32px;border-radius:2px;justify-self:center}
.tier-bar.hot{background:var(--hot)}.tier-bar.warm{background:var(--warm)}.tier-bar.watch{background:var(--watch)}
.lead-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-addr{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-cell{font-family:var(--mono);font-size:11px;color:var(--muted)}
.years-pill{display:inline-flex;align-items:center;justify-content:center;padding:3px 6px;border-radius:3px;font-family:var(--mono);font-size:10px;font-weight:500;white-space:nowrap}
.years-pill.hot{background:var(--hot-dim);color:var(--hot);border:1px solid rgba(255,59,48,.25)}
.years-pill.warm{background:var(--warm-dim);color:var(--warm);border:1px solid rgba(255,159,10,.2)}
.years-pill.watch{background:var(--watch-dim);color:var(--watch);border:1px solid rgba(48,209,88,.18)}
.score-bar{height:3px;border-radius:2px;background:var(--border);flex:1}
.score-fill{height:3px;border-radius:2px}
.detail-panel{border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}
.detail-header{padding:14px;border-bottom:1px solid var(--border)}
.detail-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:5px}
.detail-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.4}
.detail-addr{font-family:var(--mono);font-size:10px;color:var(--muted)}
.detail-body{padding:12px;flex:1}
.detail-section{margin-bottom:16px}
.detail-section-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(30,45,69,.4);gap:8px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:11px;color:var(--muted);flex-shrink:0}
.detail-val{font-family:var(--mono);font-size:11px;color:var(--text);text-align:right;word-break:break-all}
.urgency-badge{padding:3px 10px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.urgency-badge.hot{background:var(--hot-dim);color:var(--hot);border:1px solid rgba(255,59,48,.3)}
.urgency-badge.warm{background:var(--warm-dim);color:var(--warm);border:1px solid rgba(255,159,10,.25)}
.urgency-badge.watch{background:var(--watch-dim);color:var(--watch);border:1px solid rgba(48,209,88,.2)}
.ai-insight{background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:10px;margin-bottom:12px}
.ai-insight-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.ai-insight-text{font-size:11px;color:var(--muted);line-height:1.7}
.action-btns{display:flex;flex-direction:column;gap:5px;padding:12px;border-top:1px solid var(--border)}
.action-btn{padding:8px 12px;border-radius:3px;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.action-btn.cta{border-color:var(--hot);color:var(--hot);background:var(--hot-dim)}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted2);gap:10px;padding:20px;text-align:center}
.empty-detail p{font-size:11px;line-height:1.7}
.loading-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted);font-family:var(--mono);font-size:11px;text-align:center;line-height:1.8}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.source-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:2px;font-family:var(--mono);font-size:9px;border:1px solid var(--border2);color:var(--muted2)}
.source-badge.live{border-color:rgba(48,209,88,.3);color:var(--watch)}

/* PERMIT VERIFICATION */
.permit-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.permit-badge.clear{background:rgba(48,209,88,.1);color:var(--watch);border:1px solid rgba(48,209,88,.3)}
.permit-badge.flagged{background:rgba(255,59,48,.1);color:var(--hot);border:1px solid rgba(255,59,48,.3)}
.permit-badge.unknown{background:rgba(255,159,10,.08);color:var(--warm);border:1px solid rgba(255,159,10,.25)}
.permit-badge.checking{background:rgba(0,200,255,.08);color:var(--accent);border:1px solid rgba(0,200,255,.2)}
.permit-result-card{background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:10px 12px;margin-top:8px}
.permit-result-row{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.7;padding:3px 0;border-bottom:1px solid rgba(30,45,69,.4)}
.permit-result-row:last-child{border-bottom:none}
.permit-result-row strong{color:var(--text)}
/* Row-level verify badge in the lead list */
.row-permit-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:none}
.row-permit-dot.clear{background:var(--watch);display:inline-block}
.row-permit-dot.flagged{background:var(--hot);display:inline-block;box-shadow:0 0 4px var(--hot)}
.row-permit-dot.unknown{background:var(--warm);display:inline-block}

/* PIPELINE CRM */
.pipeline-wrap{padding:20px;overflow-y:auto;height:calc(100vh - 97px)}
.pipeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.pipeline-title{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-.3px}
.pipeline-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.pipeline-stat{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
.pipeline-stat-num{font-family:var(--mono);font-size:20px;font-weight:600}
.pipeline-stat-label{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.pipeline-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.pipeline-col{background:var(--surface);border:1px solid var(--border);border-radius:4px;min-height:400px;display:flex;flex-direction:column}
.pipeline-col-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
